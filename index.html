<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap');
            * {
                border: 0;
                padding: 0;
                margin: 0;
                outline: none;
                user-select: none;
            }
            html, body {
                font-size: 1em;
                background-color: #000000;
                color: rgba(255, 255, 255, 0.9);
                font-family: "Google Sans Flex", sans-serif;
                font-optical-sizing: auto;
            }
            .agenda ul#timetable {
                position: relative;
                overflow-y: scroll;
                height: calc(100vh - 7.25em - (0.875em * 4) - 40vh);
                margin: 0.875em;
                border-radius: 0.875em;
            }
            .agenda ul#timetable::-webkit-scrollbar, .agenda ul#focus::-webkit-scrollbar {
                display: none;
            }
            .agenda ul#timetable li {
                list-style-type: none;
                position: absolute;
                width: calc(100% - (0.875em * 2));
                color: rgba(0, 0, 0, 0.675);
                padding: 0.875em;
                border-radius: 0.875em;
            }
            .agenda ul#timetable li h1, .agenda ul#focus li h1 {
                font-size: 1.275em;
                line-height: calc(1.275em/1.375);
                color: rgba(0, 0, 0, 0.675);
            }
            .agenda ul#timetable li p, .agenda ul#focus li p {
                font-size: 0.7437em;
                line-height: calc(0.7437em/1.675);
                color: rgba(0, 0, 0, 0.675);
                margin: calc(0.875em/1.25) 0px;
            }
            .agenda ul#timetable li span, .agenda ul#focus li ul li {
                display: inline-block;
                background-color: rgba(0, 0, 0, 0.675); /* rgba(0, 0, 0, 0.5) */
                font-size: 0.7437em;
                line-height: calc(0.7437em/1.675);
                text-transform: uppercase;
                font-weight: 600;
                padding: calc(0.7437em/1.25);
                border-radius: 0.7437em;
            }
            .agenda #now {
                margin: 0.875em;
                border-radius: 0.875em;
                padding: 0.875em;
                height: calc(7.25em - (0.875em * 2));
                display: none;
            }
            .agenda #now div:has(p, h1) {
                height: 3.7em;
                margin-bottom: 1.5em;
            }
            .agenda #now div:has(p, h1) p {
                font-size: 0.875em;
                line-height: calc(0.875em/1.675);
                color: rgba(255, 255, 255, 0.9);
                text-shadow: 0px 0px calc(0.875em/24) rgba(0, 0, 0, 0.5);
            }
            .agenda #now div:has(p, h1) h1 {
                font-size: 1.5em;
                line-height: calc(1.5em/1.675);
                color: rgba(255, 255, 255, 0.9);
                text-shadow: 0px 0px calc(0.875em/24) rgba(0, 0, 0, 0.5);
                margin-bottom: calc(0.875em/2);
            }
            .agenda #now .progress {
                height: calc(0.875em/3);
                background-color: rgba(0, 0, 0, 0.125);
                border-radius: 0.875em;
                overflow: hidden;
                margin-top: calc(0.875em/1.125);
            }
            .agenda #now .progress div {
                background-color: rgba(255, 255, 255, 0.9);
                text-shadow: 0px 0px calc(0.875em/24) rgba(0, 0, 0, 0.5);
                height: 100%;
                border-radius: 0.875em;
            }
            .agenda ul#focus {
                margin: 0.875em;
                border-radius: 0.875em;
                height: 40vh;
                overflow-y: scroll;
            }
            .agenda ul#focus li {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .agenda ul#focus li ul li {
                background-color: rgba(255, 255, 255, 0.9);
                box-shadow: 0px 0px calc(0.875em/24) rgba(0, 0, 0, 0.5);
                text-shadow: none;
            }
            .agenda ul#focus li h1, .agenda ul#focus li p {
                color: rgba(255, 255, 255, 0.9);
                text-shadow: 0px 0px calc(0.875em/24) rgba(0, 0, 0, 0.5);
            }
            .agenda ul#focus li:not(.agenda ul#focus li ul li) {
                margin: calc(0.875em/3) 0px;
                padding: 0.875em;
                border-radius: 0.875em;
                color: rgba(0, 0, 0, 0.675);
            }
            .agenda ul#focus li:not(.agenda ul#focus li ul li):first-child, .agenda ul#focus li:not(.agenda ul#focus li ul li):last-child {
                margin: 0;
            }
            .agenda ul#focus li ul {
                list-style-type: none;
                display: flex;
                align-items: center;
                justify-content: left;
                margin-top: calc(0.875em/1.25);
            }
            .agenda ul#focus li ul li {
                display: block;
                margin-right: calc(0.875em/2);
            }
            .agenda ul#focus li div:not(.countdown) {
                width: 100%;
            }
            .agenda ul#focus li .countdown {
                height: 3.9475em;
                aspect-ratio: 1;
                background-color: #111111;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                text-transform: uppercase;
                border-radius: 0.875em;
            }
            .agenda ul#focus li .countdown h1 {
                font-size: 1.275em;
                line-height: calc(1.275em/1.6);
                margin-bottom: calc(0.875em/1.75);
            }
            .agenda ul#focus li .countdown p {
                font-size: 0.675em;
                line-height: calc(0.675em/1.6);
                margin: 0;
            }
            @media only screen and (min-width: 500px) {
                .agenda {
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    width: 500px;
                    height: 100vh;
                }
            }
        </style>
    </head>
    <body>
        <div class="agenda">
            <div id="now"></div>
            <ul id="timetable"></ul>
            <ul id="focus"></ul>
        </div>
    </body>
    <script>
        document.addEventListener("DOMContentLoaded", async (event) => {
            now = [Date.now(), document.getElementById("now")] // new Date("18 May 2026, 16:00:00")
            today = (new Date(now[0])).setHours(0, 0, 0, 0)
            rivery = await (await fetch("./rivery.json")).json()
            focus = [Object.entries(rivery.events).filter((event) => parseInt(event[0]) > now[0] && now[0] >= parseInt(event[0])-event[1].required).sort((a, b) => {
                return (((parseInt(a[0]) - now[0])/a[1].required)/a[1].weightage) - (((parseInt(b[0]) - now[0])/b[1].required)/b[1].weightage)
            }), document.getElementById("focus")]
            timetable = [document.getElementById("timetable"), rivery.timetable[(new Date(now[0])).getDay().toString()]]
            agenda = Object.entries(timetable[1]).sort((a, b) => { return a[1].end - b[1].end }).filter((event) => (now[0] - today) < event[1].end)
            timetable[0].innerHTML = ""
            now[1].className = "now"
            display = agenda.filter((event) => (now[0] - today) < event[1].start)
            for (var event in display) {
                event = [display[event], document.createElement("li")]
                event[1].style.top = (event[0][1].start - display[0][1].start) * (1/(0.5 * 60 * 1000)) + "px"
                event[1].style.height = `calc(${((event[0][1].end - event[0][1].start) * (1/(0.5 * 60 * 1000)))}px - (0.875em * 2))`
                if (event[0][1].type === "subject") {
                    event[1].style.backgroundColor = rivery.subjects[event[0][0]].color[0]
                    event[1].innerHTML = `
                        <h1>${rivery.subjects[event[0][0]].name}</h1>
                        <p>${Math.floor(event[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].start%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")} - ${Math.floor(event[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        <span style="color: ${rivery.subjects[event[0][0]].color[0]}">${event[0][1].type}</span>
                    `
                } else if (event[0][1].type === "dining") {
                    event[1].style.backgroundColor = "#91A6A6"
                    event[1].innerHTML = `
                        <h1>${event[0][0]}</h1>
                        <p>${Math.floor(event[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].start%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")} - ${Math.floor(event[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        <span style="color: #91A6A6">${event[0][1].type}</span>
                    `
                } else if (event[0][1].type === "priority") {
                    event[1].style.backgroundColor = "#CC7900"
                    event[1].innerHTML = `
                        <h1>${event[0][0]}</h1>
                        <p>${Math.floor(event[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].start%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")} - ${Math.floor(event[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        <span style="color: #CC7900">${event[0][1].type}</span>
                    `
                } else if (event[0][1].type === "non-priority") {
                    console.log(event[0][0])
                    if (Object.keys(rivery.subjects).includes(event[0][0])) {
                        event[1].style.backgroundColor = rivery.subjects[event[0][0]].color[1]
                        event[1].innerHTML = `
                            <h1>${rivery.subjects[event[0][0]].name}</h1>
                            <p>${Math.floor(event[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].start%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")} - ${Math.floor(event[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                            <span style="color: ${rivery.subjects[event[0][0]].color[1]}">${event[0][1].type}</span>
                        `
                    }
                } else if (event[0][1].type === "personal") {
                    event[1].style.backgroundColor = "#ffa2b9"
                    event[1].innerHTML = `
                        <h1>${event[0][0]}</h1>
                        <p>${Math.floor(event[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].start%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")} - ${Math.floor(event[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((event[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        <span style="color: #ffa2b9">${event[0][1].type}</span>
                    `
                }
                timetable[0].appendChild(event[1])
            }
            if ((now[0] - today) >= agenda[0][1].start && (now[0] - today) <= agenda[0][1].end) {
                if (agenda[0][1].type === "subject" || agenda[0][1].type === "non-priority") {
                    if (Object.keys(rivery.subjects).includes(agenda[0][0])) {
                        now[1].style.backgroundColor = (agenda[0][1].type === "subject") ? rivery.subjects[agenda[0][0]].color[0] : rivery.subjects[agenda[0][0]].color[1]
                        now[1].innerHTML = `
                            <div>
                                <h1>${rivery.subjects[agenda[0][0]].name}</h1>
                                <p>${Math.floor(agenda[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].start%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")} - ${Math.floor(agenda[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                            </div>
                            <div class="progress">
                                <div style="width: ${((now[0] - today) - agenda[0][1].start)/(agenda[0][1].end - agenda[0][1].start) * 100}%"></div>
                            </div>
                        `
                        now[1].style.display = "block"
                    }
                } else if (agenda[0][1].type === "dining") {
                    now[1].style.backgroundColor = "#91A6A6"
                    now[1].innerHTML = `
                        <div>
                            <h1>${agenda[0][0]}</h1>
                            <p>${Math.floor(agenda[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].start%(60 * 60 * 1000)))/(60 * 1000)).padStart(2, "0")} - ${Math.floor(agenda[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        </div>
                        <div class="progress">
                            <div style="width: ${((now[0] - today) - agenda[0][1].start)/(agenda[0][1].end - agenda[0][1].start) * 100}%"></div>
                        </div>
                    `
                    now[1].style.display = "block"
                } else if (agenda[0][1].type === "personal") {
                    now[1].style.backgroundColor = "#ffa2b9"
                    now[1].innerHTML = `
                        <div>
                            <h1>${agenda[0][0]}</h1>
                            <p>${Math.floor(agenda[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].start%(60 * 60 * 1000)))/(60 * 1000)).padStart(2, "0")} - ${Math.floor(agenda[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        </div>
                        <div class="progress">
                            <div style="width: ${((now[0] - today) - agenda[0][1].start)/(agenda[0][1].end - agenda[0][1].start) * 100}%"></div>
                        </div>
                    `
                    now[1].style.display = "block"
                } else if (agenda[0][1].type === "priority") {
                    now[1].style.backgroundColor = "#CC7900"
                    now[1].innerHTML = `
                        <div>
                            <h1>${agenda[0][0]}</h1>
                            <p>${Math.floor(agenda[0][1].start/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].start%(60 * 60 * 1000)))/(60 * 1000)).padStart(2, "0")} - ${Math.floor(agenda[0][1].end/(60 * 60 * 1000))}:${String(Math.floor((agenda[0][1].end%(60 * 60 * 1000))/(60 * 1000))).padStart(2, "0")}</p>
                        </div>
                        <div class="progress">
                            <div style="width: ${((now[0] - today) - agenda[0][1].start)/(agenda[0][1].end - agenda[0][1].start) * 100}%"></div>
                        </div>
                    `
                    now[1].style.display = "block"
                }
            } else {
                now[1].style.backgroundColor = "#111111"
                now[1].innerHTML = `
                    <div style="margin: 0; display: flex; align-items: center; justify-content: center; opacity: 0.375; height: 100%; text-align: center">
                        <div style="margin: 0; height: auto;">
                            <h1>No events.</h1>
                            <p style="font-size: 0.875em; line-height: calc(0.875em/1.5);">This timeslot is currently empty.</p>
                        </div>
                    </div>
                `
                now[1].style.display = "block"
            }
            focus[1].innerHTML = ""
            weight = focus[0].reduce((a, b) => { return a + b[1].weightage }, 0)
            for (var event in focus[0]) {
                event = [focus[0][event], document.createElement("li")]
                event[1].style.backgroundColor = rivery.subjects[event[0][1].subject].color[0]
                event[1].innerHTML = `
                    <div>
                        <h1>${event[0][1].name}</h1>
                        <p>${rivery.subjects[event[0][1].subject].name}</p>
                        <ul>
                            <li style="color: ${rivery.subjects[event[0][1].subject].color[0]}">${(event[0][1].weightage * 100).toFixed(1)}% Weightage</li>
                        </ul>
                    </div>
                    <div class="countdown">
                        <div>
                            <h1>${Math.floor((((new Date(parseInt(event[0][0]))).setHours(0, 0, 0, 0)) - now[0])/(24 * 60 * 60 * 1000))}</h1>
                            <p>Days</p>
                        </div>
                    </div>
                `
                focus[1].appendChild(event[1])
            }
            document.body.style.display = "block"
        })
    </script>
</html>
